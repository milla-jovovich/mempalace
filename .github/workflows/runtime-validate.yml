name: runtime-validate

on:
  workflow_dispatch:
  push:
    branches:
      - build/conversion-kit
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: runtime-validate-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade pip setuptools wheel hatchling

      - name: Install MemPalace editable
        run: |
          python -m pip install -e .

      - name: Regenerate spine projections
        run: |
          bash scripts/regen_spine.sh

      - name: Validate runtime surfaces
        run: |
          bash scripts/validate_runtime.sh

      - name: Upload runtime validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mempalace-runtime-validation-${{ github.run_id }}
          path: |
            .codespaces/bootstrap-report.json
            .codespaces/projection-integrity.json
            .codespaces/projection-integrity.path
            .codespaces/registry.runtime.json
            .codespaces/registry.cli.json
            .codespaces/registry.mcp.json
            .codespaces/cli.help.txt
            .codespaces/mcp.setup.txt
          if-no-files-found: warn
