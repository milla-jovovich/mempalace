name: runtime-validate

on:
  workflow_dispatch:
  push:
    branches:
      - build/conversion-kit
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: runtime-validate-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check runtime scripts
        id: runtime
        run: |
          if [ -f scripts/regen_spine.sh ] && [ -f scripts/validate_runtime.sh ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Runtime scripts not present; skipping seed validation."
          fi

      - name: Setup Python 3.13
        if: steps.runtime.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Upgrade packaging tools
        if: steps.runtime.outputs.available == 'true'
        run: |
          python -m pip install --upgrade pip setuptools wheel hatchling

      - name: Install MemPalace editable
        if: steps.runtime.outputs.available == 'true'
        run: |
          python -m pip install -e .

      - name: Regenerate spine projections
        if: steps.runtime.outputs.available == 'true'
        run: |
          bash scripts/regen_spine.sh

      - name: Validate runtime surfaces
        if: steps.runtime.outputs.available == 'true'
        run: |
          bash scripts/validate_runtime.sh

      - name: Upload runtime validation artifacts
        if: always() && steps.runtime.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mempalace-runtime-validation-${{ github.run_id }}
          path: |
            .codespaces/bootstrap-report.json
            .codespaces/projection-integrity.json
            .codespaces/projection-integrity.path
            .codespaces/registry.runtime.json
            .codespaces/registry.cli.json
            .codespaces/registry.mcp.json
            .codespaces/cli.help.txt
            .codespaces/mcp.setup.txt
          if-no-files-found: warn
