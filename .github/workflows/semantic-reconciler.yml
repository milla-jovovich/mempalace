name: semantic-reconciler
run-name: semantic-reconciler • ${{ github.ref_name }} • ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - build/conversion-kit
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: semantic-reconciler-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  reconciler-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check reconciler availability
        id: reconciler
        run: |
          if [ -f tools/mempalace_execution_kit/semantic_reconciler.py ] && [ -f tools/mempalace_execution_kit/reconcile_policy.mempalace.yaml ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Semantic reconciler files are not present in this ref; skipping seed-workflow validation."
          fi

      - name: Setup Python 3.13
        if: steps.reconciler.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install runtime dependencies
        if: steps.reconciler.outputs.available == 'true'
        run: |
          python -m pip install --upgrade pip setuptools wheel hatchling
          python -m pip install -e .

      - name: Fetch integration refs
        if: steps.reconciler.outputs.available == 'true'
        run: |
          git fetch origin develop build/conversion-kit --prune

      - name: Run semantic reconciler plan
        if: steps.reconciler.outputs.available == 'true'
        run: |
          python tools/mempalace_execution_kit/semantic_reconciler.py \
            --repo-root . \
            --policy tools/mempalace_execution_kit/reconcile_policy.mempalace.yaml \
            --mode internal \
            --action plan \
            --base-ref build/conversion-kit \
            --incoming-ref origin/develop

      - name: Upload reconciler artifacts
        if: always() && steps.reconciler.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: semantic-reconciler-plan-${{ github.run_id }}
          path: |
            .codespaces/reconciliation-report.json
            .codespaces/reconciliation-plan.md
            .codespaces/manual-conflicts.json
          if-no-files-found: warn
