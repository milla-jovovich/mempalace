name: projection-drift

on:
  workflow_dispatch:
  push:
    branches:
      - build/conversion-kit
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: projection-drift-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check drift script
        id: drift
        run: |
          if [ -f scripts/check_projection_drift.sh ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Projection drift script not present; skipping seed validation."
          fi

      - name: Setup Python 3.13
        if: steps.drift.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Upgrade packaging tools
        if: steps.drift.outputs.available == 'true'
        run: |
          python -m pip install --upgrade pip setuptools wheel hatchling

      - name: Install MemPalace editable
        if: steps.drift.outputs.available == 'true'
        run: |
          python -m pip install -e .

      - name: Enforce projection drift
        if: steps.drift.outputs.available == 'true'
        run: |
          bash scripts/check_projection_drift.sh

      - name: Capture projection drift diff on failure
        if: failure() && steps.drift.outputs.available == 'true'
        run: |
          mkdir -p .artifacts
          git diff > .artifacts/projection-drift.diff
          if [ -f .codespaces/projection-integrity.json ]; then cp .codespaces/projection-integrity.json .artifacts/; fi

      - name: Upload projection drift artifacts
        if: failure() && steps.drift.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mempalace-projection-drift-${{ github.run_id }}
          path: |
            .artifacts/projection-drift.diff
            .artifacts/projection-integrity.json
          if-no-files-found: warn
