{%- assign is_docs = false -%}
{%- if page.layout == "docs" -%}{%- assign is_docs = true -%}{%- endif -%}

<header class="topbar">
  <div class="topbar-inner">
    {% if is_docs %}
    <button class="sidebar-toggle" aria-label="Toggle sidebar" aria-expanded="false">
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 4h12v1.5H2V4zm0 3.75h12v1.5H2v-1.5zM2 11.5h12V13H2v-1.5z"/></svg>
    </button>
    {% endif %}

    <a href="{{ '/' | relative_url }}" class="topbar-brand">
      <span class="topbar-logo-wrap">
        <img src="{{ '/assets/logo.png' | relative_url }}" alt="MemPalace logo">
      </span>
      <span class="topbar-brand-text">MemPalace</span>
      <span class="topbar-version">v3.1.0</span>
    </a>

    {% if is_docs %}
    <span class="topbar-sep">/</span>
    <span class="topbar-label">Docs</span>
    {% endif %}

    <nav class="topbar-nav">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/intro' | relative_url }}">Docs</a>
      <a href="{{ '/benchmarks' | relative_url }}">Benchmarks</a>
      <a href="{{ site.github_url }}" class="gh" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2 .37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        GitHub
      </a>
    </nav>
  </div>
</header>
